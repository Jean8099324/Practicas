<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-4">

        <h1 th:if="${producto.id == null}">
            Nuevo Producto
        </h1>

        <h1 th:if="${producto.id != null}">
            Editar Producto
        </h1>

        <!-- 
<form method="post" enctype="multipart/form-data"
          th:object="${curso}"
          th:action="${curso.id == null} ? @{/cursos} : @{/cursos/{id}(id=${curso.id})}">



 -->

        <form th:object="${producto}"
            th:action="${producto.id == null} ? @{/productos} : @{/productos/{id}(id=${producto.id})}" method="post"
            enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" th:field="*{nombre}">

                <div class="text-danger" th:errors="*{nombre}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Descripción</label>

                <textarea class="form-control" rows="3" th:field="*{descripcion}">
            </textarea>

                <div class="text-danger" th:errors="*{descripcion}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Precio</label>

                <input type="number" step="0.01" class="form-control" th:field="*{precio}">

                <div class="text-danger" th:errors="*{precio}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Stock</label>

                <input type="number" class="form-control" th:field="*{stock}">

                <div class="text-danger" th:errors="*{stock}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Categoría</label>

                <input type="text" class="form-control" th:field="*{categoria}">

                <div class="text-danger" th:errors="*{categoria}">
                </div>
            </div>

            <button type="submit" class="btn btn-success">
                Guardar
            </button>

            @{/productos}
            Cancelar
            </a>

        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
