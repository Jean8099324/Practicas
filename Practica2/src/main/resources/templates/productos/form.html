<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Nuevo Producto</h2>

    @{/productos}

        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" class="form-control" th:field="*{nombre}" />
        </div>

        <div class="mb-3">
            <label>Descripción</label>
            <textarea class="form-control" th:field="*{descripcion}"></textarea>
        </div>

        <div class="mb-3">
            <label>Precio</label>
            <input type="number" step="0.01" class="form-control" th:field="*{precio}" />
        </div>

        <div class="mb-3">
            <label>Stock</label>
            <input type="number" class="form-control" th:field="*{stock}" />
        </div>

        <div class="mb-3">
            <label>Categoría</label>
            <input type="text" class="form-control" th:field="*{categoria}" />
        </div>

        <button type="submit" class="btn btn-success">
            Guardar
        </button>

</body>
</html>
