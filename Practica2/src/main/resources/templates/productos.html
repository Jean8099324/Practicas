</head>
<body>

<div class="container mt-4">

    <h1>Productos</h1>

    <div class="mb-3">

    </div>

    <table class="table table-bordered">

        <thead>

                <th>ID</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Stock</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="p : ${productos}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.nombre}"></td>
                <td th:text="${p.categoria}"></td>
                <td th:text="${p.precio}"></td>
                <td th:text="${p.stock}"></td>
            </tr>
        </tbody>

    </table>

</div>
