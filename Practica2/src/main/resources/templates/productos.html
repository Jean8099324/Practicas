<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-4">

        <h1>Productos</h1>

        <!-- Flash Message -->
        <div class="alert alert-success alert-dismissible fade show" th:if="${ok}">
            <span th:text="${ok}"></span>

            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Botón Nuevo -->
        @{/productos/nuevo}
        Nuevo Producto
        </a>

        <table class="table table-bordered table-striped">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="p : ${productos}">


                    <td th:text="${p.id}"></td>
                    <td th:text="${p.nombre}"></td>
                    <td th:text="${p.categoria}"></td>
                    <td th:text="${p.precio}"></td>
                    <td th:text="${p.stock}"></td>

                    <td>

                        @{/productos/{id}/editar(id=${p.id})}
                        Editar
                        </a>

                        <button type="button" class="btn btn-outline-danger btn-sm" data-bs-toggle="modal"
                            data-bs-target="#modalEliminar" th:data-id="${p.id}" th:data-nombre="${p.nombre}">
                            Eliminar
                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

    <!-- Modal Eliminar -->

    <div class="modal fade" id="modalEliminar" tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Confirmar eliminación</h5>

                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    ¿Desea eliminar el producto
                    <strong id="nombreProducto"></strong>?
                </div>

                <div class="modal-footer">

                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>

                    <form id="formEliminar" method="post">

                        <button type="submit" class="btn btn-danger">
                            Eliminar
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    /js/bootstrap.bundle.min.js"></script>

    <script>

        const modalEliminar = document.getElementById('modalEliminar');

        modalEliminar.addEventListener('show.bs.modal', function (event) {

            const boton = event.relatedTarget;

            const id = boton.getAttribute('data-id');
            const nombre = boton.getAttribute('data-nombre');

            document.getElementById('nombreProducto').textContent = nombre;

            document.getElementById('formEliminar').action =
                '/productos/' + id + '/eliminar';
        });

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
