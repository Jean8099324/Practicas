# ==============================================================
# Configuracion de la aplicacion
# ==============================================================
spring.application.name=tiendaapp
server.port=8081

# Recargar plantillas Thymeleaf sin reiniciar (solo en dev)
spring.thymeleaf.cache=false

# ==============================================================
# Conexion a MySQL
# ==============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/tiendadb
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================
# JPA / Hibernate
# ==============================================================
spring.jpa.hibernate.ddl-auto=update

# Ver el SQL generado en consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================================================
# Logs
# ==============================================================
logging.level.root=INFO
logging.level.com.ufide.tiendaapp=DEBUG