<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${curso.nombre} + ' | SC-403'">
        Detalle del curso
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        th:href="@{/css/styles.css}">
</head>

<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">

            <li class="breadcrumb-item">
                <a th:href="@{/}">
                    Inicio
                </a>
            </li>

            <li class="breadcrumb-item">
                <a th:href="@{/cursos}">
                    Cursos
                </a>
            </li>

            <li
                class="breadcrumb-item active"
                aria-current="page"
                th:text="${curso.nombre}">
                Curso
            </li>

        </ol>
    </nav>

    <div class="card shadow border-primary">

        <div class="card-header bg-dark-blue text-white">

            <h1
                class="h3 mb-0"
                th:text="${curso.nombre}">
                Nombre del curso
            </h1>

        </div>

        <div class="card-body">

            <p
                class="lead text-muted mb-4"
                th:text="${curso.descripcion}">
                Descripción del curso
            </p>

            <div class="row g-4 mb-4">

                <div class="col-12 col-md-4">

                    <div class="border rounded p-4 text-center h-100 detail-box">

                        <i class="bi bi-mortarboard fs-3 brand-accent"></i>

                        <p class="text-muted mb-1 mt-2">
                            Créditos
                        </p>

                        <h3
                            class="mb-0"
                            th:text="${curso.creditos}">
                            0
                        </h3>

                    </div>

                </div>

                <div class="col-12 col-md-4">

                    <div class="border rounded p-4 text-center h-100 detail-box">

                        <i class="bi bi-person-circle fs-3 brand-accent"></i>

                        <p class="text-muted mb-1 mt-2">
                            Profesor
                        </p>

                        <h5
                            class="mb-0"
                            th:text="${curso.profesor}">
                            Profesor
                        </h5>

                    </div>

                </div>

                <div class="col-12 col-md-4">

                    <div class="border rounded p-4 text-center h-100 detail-box">

                        <i class="bi bi-hash fs-3 brand-accent"></i>

                        <p class="text-muted mb-1 mt-2">
                            ID
                        </p>

                        <h3
                            class="mb-0"
                            th:text="${curso.id}">
                            0
                        </h3>

                    </div>

                </div>

            </div>

            <div class="alert alert-info">

                <i class="bi bi-info-circle me-2"></i>

                Este detalle se renderiza desde el Controller con

                <code>@PathVariable</code>.

            </div>

            <div class="d-flex justify-content-between">

                <a
                    class="btn btn-secondary"
                    th:href="@{/cursos}">

                    <i class="bi bi-arrow-left me-1"></i>
                    Volver

                </a>

                <a
                    class="btn btn-warning"
                    th:href="@{/cursos/{id}/editar(id=${curso.id})}">

                    <i class="bi bi-pencil me-1"></i>
                    Editar

                </a>

            </div>

        </div>


        
    </div>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>


</body>

</html>
