<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${curso.id == null} ? 'Nuevo curso' : 'Editar curso'">
        Curso
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        th:href="@{/css/styles.css}">
</head>

<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-5" style="max-width: 720px;">

    <div class="card shadow-sm">

        <div class="card-header bg-primary text-white">

            <h1 class="h4 mb-0">

                <i class="bi bi-mortarboard me-2"></i>

                <span th:text="${curso.id == null}
                        ? 'Nuevo curso'
                        : 'Editar curso'">
                    Curso
                </span>

            </h1>

        </div>

        <div class="card-body">

            <form
                method="post"
                th:object="${curso}"
                th:action="${curso.id == null}
                    ? @{/cursos}
                    : @{/cursos/{id}(id=${curso.id})}">

                <div
                    class="alert alert-danger"
                    th:if="${#fields.hasAnyErrors()}">

                    <i class="bi bi-exclamation-triangle me-2"></i>
                    Revisa los datos ingresados.

                    <ul class="mb-0 mt-2">
                        <li
                            th:each="error : ${#fields.allErrors()}"
                            th:text="${error}">
                            Error
                        </li>
                    </ul>

                </div>

                <input
                    type="hidden"
                    th:field="*{id}">

                <div class="mb-3">

                    <label
                        for="nombre"
                        class="form-label">
                        Nombre del curso
                    </label>

                    <input
                        id="nombre"
                        type="text"
                        class="form-control"
                        th:classappend="${#fields.hasErrors('nombre')}
                            ? 'is-invalid'
                            : ''"
                        th:field="*{nombre}"
                        placeholder="Ejemplo: Desarrollo de aplicaciones web"
                        required>

                    <div
                        class="invalid-feedback"
                        th:if="${#fields.hasErrors('nombre')}"
                        th:errors="*{nombre}">
                        Error en el nombre
                    </div>

                </div>

                <div class="mb-3">

                    <label
                        for="descripcion"
                        class="form-label">
                        Descripción
                    </label>

                    <textarea
                        id="descripcion"
                        class="form-control"
                        rows="4"
                        th:classappend="${#fields.hasErrors('descripcion')}
                            ? 'is-invalid'
                            : ''"
                        th:field="*{descripcion}"
                        placeholder="Escribe una descripción del curso"
                        required></textarea>

                    <div
                        class="invalid-feedback"
                        th:if="${#fields.hasErrors('descripcion')}"
                        th:errors="*{descripcion}">
                        Error en la descripción
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-4 mb-3">

                        <label
                            for="creditos"
                            class="form-label">
                            Créditos
                        </label>

                        <input
                            id="creditos"
                            type="number"
                            class="form-control"
                            min="1"
                            max="8"
                            th:classappend="${#fields.hasErrors('creditos')}
                                ? 'is-invalid'
                                : ''"
                            th:field="*{creditos}"
                            required>

                        <div
                            class="invalid-feedback"
                            th:if="${#fields.hasErrors('creditos')}"
                            th:errors="*{creditos}">
                            Error en los créditos
                        </div>

                    </div>

                    <div class="col-md-8 mb-3">

                        <label
                            for="profesor"
                            class="form-label">
                            Profesor
                        </label>

                        <input
                            id="profesor"
                            type="text"
                            class="form-control"
                            th:classappend="${#fields.hasErrors('profesor')}
                                ? 'is-invalid'
                                : ''"
                            th:field="*{profesor}"
                            placeholder="Nombre del profesor"
                            required>

                        <div
                            class="invalid-feedback"
                            th:if="${#fields.hasErrors('profesor')}"
                            th:errors="*{profesor}">
                            Error en el profesor
                        </div>

                    </div>

                </div>

                <div class="d-flex justify-content-between mt-4">

                    <a
                        class="btn btn-secondary"
                        th:href="@{/cursos}">

                        <i class="bi bi-arrow-left me-1"></i>
                        Cancelar

                    </a>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        <i class="bi bi-check-circle me-1"></i>

                        <span th:text="${curso.id == null}
                                ? 'Crear curso'
                                : 'Guardar cambios'">
                            Guardar
                        </span>

                    </button>

                </div>

            </form>

        </div>

    </div>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
