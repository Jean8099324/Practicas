<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${evento != null ? evento.nombre + ' | EventApp' : 'Evento no encontrado'}">
        Evento
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div th:replace="~{fragments/header :: navbar}"></div>


    <main class="container my-4" style="max-width: 720px;">


        <nav aria-label="breadcrumb">

            <ol class="breadcrumb">

                <li class="breadcrumb-item">

                    <a th:href="@{/eventos}">
                        Eventos
                    </a>

                </li>

                <li class="breadcrumb-item active">
                    Detalle
                </li>

            </ol>

        </nav>



        <div th:if="${evento == null}" class="alert alert-warning">

            <i class="bi bi-exclamation-triangle me-2"></i>

            Evento no encontrado.

        </div>



        <div th:if="${evento != null}" class="card shadow-sm border-0">


            <div class="card-body">


                <div class="d-flex justify-content-between align-items-start mb-3">


                    <h1 class="h3 mb-0 fw-bold" th:text="${evento.nombre}">
                        Nombre
                    </h1>


                    <span class="badge bg-secondary" th:text="${evento.categoria}">
                        Categoría
                    </span>


                </div>



                <p class="text-muted" th:text="${evento.descripcion}">
                    Descripción
                </p>



                <hr>



                <dl class="row mb-0">


                    <dt class="col-sm-4">
                        <i class="bi bi-calendar-event"></i>
                        Fecha
                    </dt>

                    <dd class="col-sm-8">
                        <span th:if="${evento.fecha != null}" th:text="${#temporals.format(evento.fecha,'dd/MM/yyyy')}">
                            Fecha
                        </span>

                        <span th:if="${evento.fecha == null}">
                            Sin fecha
                        </span>
                    </dd>



                    <dt class="col-sm-4">
                        <i class="bi bi-geo-alt"></i>
                        Lugar
                    </dt>

                    <dd class="col-sm-8" th:text="${evento.lugar}">
                        Lugar
                    </dd>




                    <dt class="col-sm-4">
                        <i class="bi bi-person"></i>
                        Organizador
                    </dt>

                    <dd class="col-sm-8" th:text="${evento.organizador}">
                        Organizador
                    </dd>




                    <dt class="col-sm-4">
                        <i class="bi bi-people"></i>
                        Cupos
                    </dt>

                    <dd class="col-sm-8">

                        <span class="fw-bold" th:text="${evento.cuposVendidos}">
                            0
                        </span>

                        /

                        <span class="fw-bold" th:text="${evento.cupoMaximo}">
                            0
                        </span>

                    </dd>




                    <dt class="col-sm-4">
                        <i class="bi bi-currency-dollar"></i>
                        Precio
                    </dt>


                    <dd class="col-sm-8">


                        <span th:if="${evento.precio == 0}" class="badge bg-success">

                            Gratis

                        </span>



                        <span th:if="${evento.precio != 0}" class="badge bg-success"
                            th:text="${'CRC ' + #numbers.formatDecimal(evento.precio,1,2)}">

                            Precio

                        </span>


                    </dd>


                </dl>



                <div class="d-flex justify-content-between mt-4">


                    <a th:href="@{/eventos}" class="btn btn-secondary">

                        <i class="bi bi-arrow-left me-1"></i>

                        Volver

                    </a>



                    <a th:href="@{/eventos/{id}/editar(id=${evento.id})}" class="btn btn-warning">

                        <i class="bi bi-pencil-square me-1"></i>

                        Editar

                    </a>


                </div>


            </div>


        </div>


    </main>



    <footer th:replace="~{fragments/header :: footer}"></footer>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
