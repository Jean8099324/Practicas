<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulario Evento</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <div class="container mt-4">

        <h2 class="mb-4" th:text="${evento.id == null ? 'Nuevo Evento' : 'Editar Evento'}">
            Evento
        </h2>


        <form th:object="${evento}" th:action="${evento.id == null} 
        ? @{/eventos} 
        : @{/eventos/{id}(id=${evento.id})}" method="post">


            <input type="hidden" th:field="*{id}">


            <!-- Nombre -->
            <div class="mb-3">
                <label class="form-label">Nombre</label>

                <input class="form-control" type="text" th:field="*{nombre}"
                    th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'">

                <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">
                </div>
            </div>


            <!-- Descripción -->
            <div class="mb-3">
                <label class="form-label">Descripción</label>

                <textarea class="form-control" th:field="*{descripcion}"
                    th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid'">
            </textarea>

                <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}">
                </div>
            </div>


            <!-- Fecha -->
            <div class="mb-3">
                <label class="form-label">Fecha</label>

                <input class="form-control" type="date" th:field="*{fecha}"
                    th:classappend="${#fields.hasErrors('fecha')} ? 'is-invalid'">

                <div class="invalid-feedback" th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}">
                </div>
            </div>


            <!-- Lugar -->
            <div class="mb-3">
                <label class="form-label">Lugar</label>

                <input class="form-control" type="text" th:field="*{lugar}"
                    th:classappend="${#fields.hasErrors('lugar')} ? 'is-invalid'">

                <div class="invalid-feedback" th:if="${#fields.hasErrors('lugar')}" th:errors="*{lugar}">
                </div>
            </div>


            <!-- Categoría -->
            <div class="mb-3">
                <label class="form-label">Categoría</label>

                <input class="form-control" type="text" th:field="*{categoria}"
                    th:classappend="${#fields.hasErrors('categoria')} ? 'is-invalid'">

                <div class="invalid-feedback" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}">
                </div>
            </div>


            <!-- Organizador -->
            <div class="mb-3">
                <label class="form-label">Organizador</label>

                <input class="form-control" type="text" th:field="*{organizador}"
                    th:classappend="${#fields.hasErrors('organizador')} ? 'is-invalid'">

                <div class="invalid-feedback" th:if="${#fields.hasErrors('organizador')}" th:errors="*{organizador}">
                </div>
            </div>


            <!-- Cupo máximo -->
            <div class="mb-3">
                <label class="form-label">Cupo Máximo</label>

                <input class="form-control" type="number" th:field="*{cupoMaximo}"
                    th:classappend="${#fields.hasErrors('cupoMaximo')} ? 'is-invalid'">

                <div class="invalid-feedback" th:if="${#fields.hasErrors('cupoMaximo')}" th:errors="*{cupoMaximo}">
                </div>
            </div>


            <!-- Cupos vendidos -->
            <div class="mb-3">
                <label class="form-label">Cupos Vendidos</label>

                <input class="form-control" type="number" th:field="*{cuposVendidos}"
                    th:classappend="${#fields.hasErrors('cuposVendidos')} ? 'is-invalid'">

                <div class="invalid-feedback" th:if="${#fields.hasErrors('cuposVendidos')}"
                    th:errors="*{cuposVendidos}">
                </div>
            </div>


            <!-- Precio -->
            <div class="mb-3">
                <label class="form-label">Precio</label>

                <input class="form-control" type="number" step="0.01" th:field="*{precio}"
                    th:classappend="${#fields.hasErrors('precio')} ? 'is-invalid'">

                <div class="invalid-feedback" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}">
                </div>
            </div>


            <button type="submit" class="btn btn-success">
                Guardar
            </button>

            <a th:href="@{/eventos}" class="btn btn-secondary">
                Cancelar
            </a>


        </form>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
