<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | EventApp</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div th:replace="~{fragments/header :: navbar}"></div>

    <main class="container my-4">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
                <h1 class="fw-bold text-primary mb-1">
                    <i class="bi bi-calendar-event"></i>

                    <div class="card shadow-sm mb-4">

                        <div class="card-body">

                            <h5 class="card-title">
                                <i class="bi bi-funnel"></i>
                                Filtrar por categoría
                            </h5>


                            <form method="get" th:action="@{/eventos/categoria}">

                                <div class="input-group">

                                    <select class="form-select" id="categoria" name="categoria">

                                        <option value="">
                                            Seleccione una categoría
                                        </option>

                                        <option value="Concierto">
                                            Concierto
                                        </option>

                                        <option value="Taller">
                                            Taller
                                        </option>

                                        <option value="Conferencia">
                                            Conferencia
                                        </option>

                                    </select>


                                    <button class="btn btn-primary" type="submit">

                                        <i class="bi bi-search"></i>
                                        Buscar

                                    </button>

                                </div>

                            </form>

                        </div>

                    </div>

                    Catálogo de Eventos
                </h1>

                <p class="text-muted mb-0">
                    Total:
                    <span class="badge bg-primary" th:text="${eventos.size()}">0</span>
                </p>
            </div>

            <a th:href="@{/eventos/nuevo}" class="btn btn-success">
                <i class="bi bi-plus-circle me-1"></i>
                Nuevo Evento
            </a>

        </div>

        <div class="alert alert-success" th:if="${ok}" th:text="${ok}">
        </div>

        <div class="row g-3">

            <div class="col-12 col-md-6 col-lg-4" th:each="e : ${eventos}">

                <div class="card h-100 shadow-sm">

                    <div class="card-body d-flex flex-column">

                        <div class="d-flex justify-content-between align-items-center mb-2">

                            <span class="badge bg-secondary" th:text="${e.categoria}">
                                Categoría
                            </span>

                            <small class="text-muted" th:text="${#temporals.format(e.fecha,'dd/MM/yyyy')}">
                                Fecha
                            </small>

                        </div>

                        <h5 class="card-title" th:text="${e.nombre}">
                            Nombre
                        </h5>

                        <p class="card-text text-muted small flex-grow-1" th:text="${e.descripcion}">
                            Descripción
                        </p>

                        <p class="mb-2">
                            <i class="bi bi-geo-alt-fill text-danger"></i>
                            <span th:text="${e.lugar}"></span>
                        </p>

                        <div class="d-flex justify-content-between">

                            <small>
                                Cupos:
                                <strong th:text="${e.cuposVendidos + ' / ' + e.cupoMaximo}">
                                    0/0
                                </strong>
                            </small>

                            <span class="badge bg-success">
                                ₡ <span th:text="${e.precio}"></span>
                            </span>

                        </div>

                        <hr>

                        <div class="d-flex justify-content-between">

                            <a th:href="@{/eventos/{id}(id=${e.id})}" class="btn btn-outline-primary btn-sm">

                                <i class="bi bi-eye"></i>
                                Ver

                            </a>

                            <a th:href="@{/eventos/{id}/editar(id=${e.id})}" class="btn btn-outline-warning btn-sm">

                                <i class="bi bi-pencil-square"></i>
                                Editar

                            </a>

                            <button type="button" class="btn btn-outline-danger btn-sm" data-bs-toggle="modal"
                                data-bs-target="#eliminarModal" th:data-id="${e.id}" th:data-nombre="${e.nombre}">

                                <i class="bi bi-trash"></i>
                                Eliminar

                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <div class="alert alert-warning mt-4" th:if="${eventos.isEmpty()}">

            <i class="bi bi-exclamation-triangle"></i>

            No hay eventos registrados.

        </div>

    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>

    <!-- Modal -->

    <div class="modal fade" id="eliminarModal" tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Confirmar eliminación
                    </h5>

                    <button class="btn-close" data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    ¿Desea eliminar el evento
                    <strong id="nombreEvento"></strong>?

                </div>

                <div class="modal-footer">

                    <button class="btn btn-secondary" data-bs-dismiss="modal">

                        Cancelar

                    </button>

                    <form id="formEliminar" method="post">

                        <button class="btn btn-danger" type="submit">

                            Eliminar

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        const modal = document.getElementById('eliminarModal');

        modal.addEventListener('show.bs.modal', function (event) {

            const button = event.relatedTarget;

            const id = button.getAttribute('data-id');
            const nombre = button.getAttribute('data-nombre');

            document.getElementById('nombreEvento').textContent = nombre;

            document.getElementById('formEliminar').action =
                '/eventos/' + id + '/eliminar';

        });

    </script>

</body>

</html>
